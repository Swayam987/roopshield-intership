<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Card Component</title>

  <!-- Connect CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main Grid Container -->
  <div class="card-grid">

    <!-- Card 1 -->
    <div class="card">
      <div class="card-img"></div>

      <h3>John Doe</h3>

      <p>Frontend Developer and UI Designer.</p>

      <button>View Profile</button>
    </div>

    <!-- Card 2 -->
    <div class="card">
      <div class="card-img"></div>

      <h3>Emma Smith</h3>

      <p>Creative Graphic Designer.</p>

      <button>View Profile</button>
    </div>

    <!-- Card 3 -->
    <div class="card">
      <div class="card-img"></div>

      <h3>Alex Brown</h3>

      <p>Backend Developer and Tech Enthusiast.</p>

      <button>View Profile</button>
    </div>

  </div>

</body>
</html>
