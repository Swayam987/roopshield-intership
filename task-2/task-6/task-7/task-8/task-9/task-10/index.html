<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Filter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Image Gallery</h1>

  <div class="buttons">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="nature">Nature</button>
    <button class="filter-btn" data-filter="city">City</button>
    <button class="filter-btn" data-filter="food">Food</button>
  </div>

  <div class="gallery">

    <div class="gallery-item" data-category="nature">
      <img src="https://picsum.photos/300/200?random=1">
    </div>

    <div class="gallery-item" data-category="city">
      <img src="https://picsum.photos/300/200?random=2">
    </div>

    <div class="gallery-item" data-category="food">
      <img src="https://picsum.photos/300/200?random=3">
    </div>

    <div class="gallery-item" data-category="nature">
      <img src="https://picsum.photos/300/200?random=4">
    </div>

    <div class="gallery-item" data-category="city">
      <img src="https://picsum.photos/300/200?random=5">
    </div>

    <div class="gallery-item" data-category="food">
      <img src="https://picsum.photos/300/200?random=6">
    </div>

  </div>

  <script src="main.js"></script>

</body>
</html>
